name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            web/package-lock.json
            app/package-lock.json

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Install app dependencies
        working-directory: app
        run: npm ci

      - name: Build Windows exe
        shell: pwsh
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: ./scripts/package-win.ps1 -SkipInstall

      - name: Verify installer output
        shell: pwsh
        run: |
          $installers = Get-ChildItem -Path release -Filter "*.exe" -File
          if (-not $installers) {
            throw "No .exe installer was produced in the release directory."
          }
          $installers | Format-Table Name, Length

      - name: Upload GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.exe
