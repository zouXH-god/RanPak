name: Release Cloud Service

on:
  push:
    tags:
      - "v*"
      - "cloud-v*"

permissions:
  contents: write
  packages: write

jobs:
  build-cloud:
    name: Build Cloud Service (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: ""
          - goos: linux
            goarch: arm64
            suffix: ""
          - goos: windows
            goarch: amd64
            suffix: ".exe"
          - goos: darwin
            goarch: amd64
            suffix: ""
          - goos: darwin
            goarch: arm64
            suffix: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: cloud/go.sum

      - name: Build binary
        working-directory: cloud
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          OUTPUT_NAME="ranpak-cloud-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }}"
          go build -ldflags="-s -w" -o "../release-cloud/${OUTPUT_NAME}" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ranpak-cloud-${{ matrix.goos }}-${{ matrix.goarch }}
          path: release-cloud/

  docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: build-cloud

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version tag
        id: meta
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          IMAGE="ghcr.io/${GITHUB_REPOSITORY}/ranpak-cloud"
          echo "version=${TAG}" >> "$GITHUB_OUTPUT"
          echo "image=${IMAGE,,}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: cloud
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ steps.meta.outputs.image }}:latest
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-cloud

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-cloud
          pattern: ranpak-cloud-*
          merge-multiple: true

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-cloud/*
